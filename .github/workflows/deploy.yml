name: Build & deploy

# Triggers:
#  - push to main      → rebuild + redeploy on every code change
#  - schedule (daily)  → fetch fresh EODHD data + rebuild
#  - workflow_dispatch → manual run from the Actions tab
on:
  push:
    branches: [main]
  schedule:
    # 03:30 UTC daily. Adjust to taste.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      window:
        description: "Listing window to bake"
        required: false
        default: "1y"
        type: choice
        options: ["30d", "90d", "6m", "1y", "all"]

permissions:
  contents: write       # needed to commit docs/data back to the repo

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify EODHD_API_KEY is set
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          if [ -z "$EODHD_API_KEY" ]; then
            echo "::warning::EODHD_API_KEY secret is not set — skipping data rebuild. Add the secret at Settings → Secrets → Actions."
            echo "SKIP_REBUILD=1" >> $GITHUB_ENV
          fi

      - name: Build static site
        if: env.SKIP_REBUILD != '1'
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        # exit 2 = EODHD auth failed mid-build; we keep previous data.
        # exit 0 = success. Any other non-zero is a real failure.
        run: |
          set +e
          python -m backend.build_static --window "${{ inputs.window || '1y' }}"
          rc=$?
          if [ $rc -eq 2 ]; then
            echo "::warning::EODHD auth failed during build — listings/full/news preserved from previous run."
            echo "SKIP_REBUILD=1" >> $GITHUB_ENV
          elif [ $rc -ne 0 ]; then
            echo "::error::Build failed with exit $rc"
            exit $rc
          fi

      - name: Commit refreshed data
        if: env.SKIP_REBUILD != '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data intelligence
          if git diff --cached --quiet; then
            echo "no data changes to commit"
          else
            git commit -m "data: rebuild $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main           # pull the freshly-committed docs/
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on this repo if it isn't already.
          # Lets the first workflow run bring the site up without a
          # manual click through Settings → Pages.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
